<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>115年廉政有獎徵答活動</title>
<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Microsoft JhengHei",sans-serif;
}
canvas{
  display:block;
  width:100vw;
  height:100vh;
}
.panel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  width:420px;
  max-width:90vw;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  text-align:center;
  z-index:20;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2e7d32;
  color:white;
  font-size:15px;
}
button:hover{
  background:#256428;
}
input, select{
  width:100%;
  padding:8px;
  margin-top:8px;
  box-sizing:border-box;
  font-size:15px;
}
#ui{
  position:absolute;
  top:20px;
  left:20px;
  font-size:32px;
  font-weight:bold;
  color:#fff;
  text-shadow:
    2px 2px 0 #000,
   -2px 2px 0 #000,
    2px -2px 0 #000,
   -2px -2px 0 #000;
  z-index:10;
}
.hidden{
  display:none;
}
#mobileControls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
  z-index:1000;
}
@media (min-width:769px){
  #mobileControls{
    display:none;
  }
}
#mobileControls button{
  width:70px;
  height:70px;
  font-size:28px;
  border-radius:50%;
  border:none;
  background:#2e7d32;
  color:white;
  opacity:0.85;
}
#finalResult{
  white-space:pre-line;
  line-height:1.8;
}
#feedbackPanel{
  position:absolute;
}
#closeFeedback{
  position:absolute;
  top:10px;
  right:10px;
  width:36px;
  height:36px;
  padding:0;
  margin:0;
  border:none;
  border-radius:50%;
  background:#ccc;
  color:#000;
  font-size:20px;
  line-height:36px;
  cursor:pointer;
}
#closeFeedback:hover{
  background:#bbb;
}
#feedbackText{
  margin-top:10px;
  line-height:1.6;
  word-break:break-word;
}
</style>
</head>
<body>

<div id="mobileControls">
  <button id="btnLeft">◀</button>
  <button id="btnRight">▶</button>
</div>

<canvas id="game"></canvas>

<div id="ui" class="hidden">
  關卡 <span id="level">1</span>/10　
  分數 <span id="score">0</span>
</div>

<div id="startPanel" class="panel">
  <h2>臺中市政府交通局<br>115年度廉政有獎徵答活動</h2>
  
  <div style="display:flex; gap:15px; align-items:flex-start; margin:10px 0;">

    <div style="flex:1; text-align:left; font-size:14px; line-height:1.6;">
      《遊戲說明》<br>
      1. 以電腦操作體驗最佳。<br>
      2. 以「鍵盤⌨️」方向鍵⬅️ ➡️控制廉小風。<br>
      3. ⬅️ ➡️控制廉小風碰觸「小蜜蜂🐝」後答題。<br>
      4. 以「滑鼠🖱️」點選正確答題。<br>
      5. 每題10分，共10題。<br>
      6. 達<b>90分</b>以上符合抽獎資格。
    </div>

    <img src="intro.png"
         style="width:120px; height:120px; object-fit:contain; border-radius:8px;">
  </div>

  <input id="playerName" placeholder="姓名">

  <select id="playerOrg">
    <option value="">機關</option>
    <option value="交通局">交通局</option>
    <option value="停管處">停管處</option>
    <option value="裁決處">裁決處</option>
    <option value="車鑑會">車鑑會</option>
  </select>

  <input id="playerDept" placeholder="科室">

  <select id="playerRole">
    <option value="">職務類型</option>
    <option value="主管人員（含高階主管及中階主管）">主管人員（含高階主管及中階主管）</option>
    <option value="辦理綠能業務人員">辦理綠能業務人員</option>
    <option value="採購人員">採購人員</option>
    <option value="一般人員（其他同仁）">一般人員（其他同仁）</option>
    <option value="新進人員">新進人員</option>
  </select>

  <button onclick="startGame()">開始挑戰</button>
</div>

<div id="quizPanel" class="panel hidden">
  <h3 id="question"></h3>
  <div id="answers"></div>
</div>

<div id="feedbackPanel" class="panel hidden">
  <button id="closeFeedback">×</button>
  <h2 id="feedbackText"></h2>
</div>

<div id="endPanel" class="panel hidden">
  <h2>挑戰完成</h2>
  <p id="finalResult"></p>
  <button onclick="location.reload()">重新開始</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scale = 1.8;
let ground = 0;
let worldWidth = 5150;

let state = "start";
let name = "";
let playerOrg = "";
let playerDept = "";
let playerRole = "";

let level = 1;
let score = 0;
let cameraX = 0;
let keys = {};
let gravity = 0.8;
let currentQuestions = [];
let feedbackCallback = null;

let player = {
  x:100,
  y:0,
  width:66 * scale,
  height:86 * scale,
  vx:0,
  vy:0,
  speed:8,
  jump:16 * scale,
  grounded:false,
  currentFrame:0,
  frameCount:3,
  frameTimer:0,
  frameInterval:10
};

let goals = [];
let finishMark = null;
let gameLoopStarted = false;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ground = canvas.height - 50 * scale;

  if(player){
    if(player.y + player.height >= ground){
      player.y = ground - player.height;
      player.vy = 0;
      player.grounded = true;
    }
  }

  if(goals.length > 0){
    goals.forEach((g, i) => {
      let posX = 400 + i * 500;
      if(i === 9){
        posX -= 120;
      }
      g.x = posX;
      g.y = ground - 80 * scale;
    });

    const lastGoal = goals[goals.length - 1];
    finishMark = {
      x: lastGoal.x + 10,
      y: lastGoal.y - 118,
      width: 135,
      height: 85
    };
  }
}
window.addEventListener("resize", resizeCanvas);

const bgImg = new Image();
bgImg.src = "bg.png";

const playerImg = new Image();
playerImg.src = "player.png";

const flagImg = new Image();
flagImg.src = "flag.png";

const flagCorrectImg = new Image();
flagCorrectImg.src = "flag_correct.png";

const flagWrongImg = new Image();
flagWrongImg.src = "flag_wrong.png";

const finishImg = new Image();
finishImg.src = "finish.png";

let imagesLoaded = 0;
[bgImg, playerImg, flagImg, flagCorrectImg, flagWrongImg, finishImg].forEach(img => {
  img.onload = () => {
    imagesLoaded++;
    if(imagesLoaded === 6){
      init();
    }
  };
});

  ],

  "基礎題庫":[

    {q:"發現疑似不法情事時，較適當的作法為何？",a:["假裝沒看到","向政風等權責單位反映","上網爆料即可","先傳給朋友"],c:1},
    {q:"下列何者可能涉及利益衝突？",a:["承辦自己親友相關案件","依法請假","正常開會","一般文書作業"],c:0},
    {q:"公務員執行職務最基本的原則為何？",a:["依法行政","看心情辦理","先幫熟人","長官說了算"],c:0},
    {q:"與廠商互動時，何者較適當？",a:["保持公私分際","私下接受招待","幫忙喬事情","口頭答應方便處理"],c:0},
    {q:"收到不明好處邀約時，應如何處理？",a:["先接受再說","拒絕並視情況報告","轉送同事","低調參加"],c:1},
    {q:"廉政宣導主要目的為何？",a:["增加 paperwork","建立正確法紀觀念","讓大家更怕出門","只是形式"],c:1},
    {q:"遇到請託關說時，正確觀念為何？",a:["能幫就幫","應依規定處理","先答應再修正","私下處理較快"],c:1},
    {q:"公務員處理公務資料，應注意什麼？",a:["可任意外傳","應妥善保管","可給熟人參考","下班就不管"],c:1},
    {q:"何者較符合公務員廉潔要求？",a:["便宜行事","透明、誠信、守法","收小禮無妨","私下幫忙關說"],c:1}
  ]
};

document.addEventListener("keydown", e => {
  keys[e.code] = true;
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

function init(){
  resizeCanvas();

  player.x = 100;
  player.y = ground - player.height;
  player.vx = 0;
  player.vy = 0;
  player.grounded = true;

  goals = [];
  for(let i = 0; i < 10; i++){
    let posX = 400 + i * 500;
    if(i === 9){
      posX -= 120;
    }

    goals.push({
      x: posX,
      y: ground - 80 * scale,
      width: 70 * scale,
      height: 80 * scale,
      triggered: false,
      frame: 0,
      frameTimer: 0,
      correct: null
    });
  }

  const lastGoal = goals[goals.length - 1];
  finishMark = {
    x: lastGoal.x - 32,
    y: lastGoal.y - 118,
    width: 135,
    height: 85
  };

  if(!gameLoopStarted){
    gameLoopStarted = true;
    requestAnimationFrame(loop);
  }
}

function getQuestionBankByRole(role){
  if(role === "主管人員（含高階主管及中階主管）"){
    return questionBanks["主管題庫"];
  }
  if(role === "辦理綠能業務人員"){
    return questionBanks["綠能題庫"];
  }
  if(role === "採購人員"){
    return questionBanks["採購題庫"];
  }
  return questionBanks["基礎題庫"];
}

function startGame(){
  name = document.getElementById("playerName").value.trim();
  playerOrg = document.getElementById("playerOrg").value;
  playerDept = document.getElementById("playerDept").value.trim();
  playerRole = document.getElementById("playerRole").value;

  if(!name || !playerOrg || !playerDept || !playerRole){
    alert("請完整填寫資料");
    return;
  }

  currentQuestions = getQuestionBankByRole(playerRole);

  if(!currentQuestions || currentQuestions.length !== 10){
    alert("題庫設定有誤");
    return;
  }

  level = 1;
  score = 0;
  cameraX = 0;
  feedbackCallback = null;
  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;

  player.x = 100;
  player.y = ground - player.height;
  player.vx = 0;
  player.vy = 0;
  player.currentFrame = 0;
  player.frameTimer = 0;
  player.grounded = true;

  goals.forEach(g => {
    g.triggered = false;
    g.correct = null;
  });

  document.getElementById("startPanel").classList.add("hidden");
  document.getElementById("ui").classList.remove("hidden");
  document.getElementById("quizPanel").classList.add("hidden");
  document.getElementById("feedbackPanel").classList.add("hidden");
  document.getElementById("endPanel").classList.add("hidden");

  state = "play";
}

function update(){
  if(state !== "play") return;

  if(keys["ArrowRight"]){
    player.vx = player.speed;
  }else if(keys["ArrowLeft"]){
    player.vx = -player.speed;
  }else{
    player.vx = 0;
  }

  if(keys["Space"] && player.grounded){
    player.vy = -player.jump;
    player.grounded = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  if(player.x < 0) player.x = 0;
  if(player.x > worldWidth - player.width) player.x = worldWidth - player.width;

  if(player.y + player.height >= ground){
    player.y = ground - player.height;
    player.vy = 0;
    player.grounded = true;
  }

  if(player.vx !== 0){
    player.frameTimer++;
    if(player.frameTimer >= player.frameInterval){
      player.currentFrame = (player.currentFrame + 1) % player.frameCount;
      player.frameTimer = 0;
    }
  }else{
    player.currentFrame = 0;
  }

  cameraX += ((player.x - canvas.width * 0.35) - cameraX) * 0.1;
  if(cameraX < 0) cameraX = 0;
  if(cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;

  goals.forEach(g => {
    if(g.correct === null){
      g.frameTimer++;
      if(g.frameTimer > 20){
        g.frame = (g.frame + 1) % 2;
        g.frameTimer = 0;
      }
    }
  });

  if(level <= goals.length){
    const g = goals[level - 1];
    if(!g.triggered && collide(player, g)){
      g.triggered = true;
      state = "quiz";
      player.vx = 0;

      document.getElementById("quizPanel").classList.remove("hidden");

      const q = currentQuestions[level - 1];
      document.getElementById("question").innerText = q.q;

      const ansDiv = document.getElementById("answers");
      ansDiv.innerHTML = "";

      q.a.forEach((text, index) => {
        const btn = document.createElement("button");
        btn.innerText = text;
        btn.onclick = () => checkAnswer(index);
        ansDiv.appendChild(btn);
      });
    }
  }
}

function checkAnswer(index){
  const q = currentQuestions[level - 1];
  const isCorrect = index === q.c;

  goals[level - 1].correct = isCorrect;

  if(isCorrect){
    score += 10;
  }

  document.getElementById("score").innerText = score;
  document.getElementById("quizPanel").classList.add("hidden");

  showFeedback(
    isCorrect,
    q.a[q.c],
    () => {
      level++;
      document.getElementById("level").innerText = level > 10 ? 10 : level;

      if(level > 10){
        endGame();
      }else{
        state = "play";
      }
    }
  );
}

function showFeedback(isCorrect, correctText, callback){
  const panel = document.getElementById("feedbackPanel");
  const text = document.getElementById("feedbackText");

  if(isCorrect){
    text.innerText = "答對了！";
    text.style.color = "#2e7d32";
  }else{
    text.innerText = "答錯了！正確答案是 " + correctText;
    text.style.color = "#c62828";
  }

  feedbackCallback = callback;
  panel.classList.remove("hidden");
}

document.getElementById("closeFeedback").addEventListener("click", () => {
  document.getElementById("feedbackPanel").classList.add("hidden");

  if(feedbackCallback){
    const cb = feedbackCallback;
    feedbackCallback = null;
    cb();
  }
});

function collide(a, b){
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const bgCount = Math.ceil(worldWidth / canvas.width) + 1;
  for(let i = 0; i < bgCount; i++){
    ctx.drawImage(
      bgImg,
      0, 0, bgImg.width, bgImg.height,
      i * canvas.width - cameraX * 0.7, 0,
      canvas.width, canvas.height
    );
  }

  goals.forEach(g => {
    if(g.correct === true){
      ctx.drawImage(
        flagCorrectImg,
        0, 0, flagCorrectImg.width, flagCorrectImg.height,
        g.x - cameraX, g.y, g.width, g.height
      );
    }else if(g.correct === false){
      ctx.drawImage(
        flagWrongImg,
        0, 0, flagWrongImg.width, flagWrongImg.height,
        g.x - cameraX, g.y, g.width, g.height
      );
    }else{
      ctx.drawImage(
        flagImg,
        g.frame * 250, 0, 250, 378,
        g.x - cameraX, g.y, g.width, g.height
      );
    }
  });

  if(finishMark){
    ctx.drawImage(
      finishImg,
      finishMark.x - cameraX,
      finishMark.y,
      finishMark.width,
      finishMark.height
    );
  }

  ctx.drawImage(
    playerImg,
    player.currentFrame * (200 / 3), 0, (200 / 3), 83,
    player.x - cameraX, player.y, player.width, player.height
  );
}

function endGame(){
  state = "end";
  document.getElementById("ui").classList.add("hidden");
  document.getElementById("feedbackPanel").classList.add("hidden");
  document.getElementById("endPanel").classList.remove("hidden");

  document.getElementById("finalResult").innerText =
    "挑戰者：" + name + "\n" +
    "機關：" + playerOrg + "\n" +
    "職務類型：" + playerRole + "\n" +
    "科室：" + playerDept + "\n" +
    "總分：" + score + " 分\n" +
    (score >= 90
      ? "恭喜達到90分以上，符合抽獎資格。"
      : "未達90分，不符合抽獎資格。"
    );

  sendToGoogle(score);
}

function sendToGoogle(score){
  const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScdNCEoBimh2GRPDz0TqGWHpWldiB3g6lZ4zjAYcZZUj8Rgrw/formResponse";

  const fields = {
    "entry.993402590": name,
    "entry.1922734240": playerOrg,
    "entry.1158877454": playerRole,
    "entry.1807015476": playerDept,
    "entry.2064592372": score
  };

  fetch(formURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams(fields)
  })
  .then(() => {
    console.log("資料已送出 Google 表單");
  })
  .catch(err => {
    console.error("送出失敗:", err);
  });
}

const btnLeft = document.getElementById("btnLeft");
const btnRight = document.getElementById("btnRight");

btnLeft.addEventListener("touchstart", () => {
  keys["ArrowLeft"] = true;
});
btnLeft.addEventListener("touchend", () => {
  keys["ArrowLeft"] = false;
});
btnRight.addEventListener("touchstart", () => {
  keys["ArrowRight"] = true;
});
btnRight.addEventListener("touchend", () => {
  keys["ArrowRight"] = false;
});

document.addEventListener("touchmove", e => {
  e.preventDefault();
}, { passive:false });

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
